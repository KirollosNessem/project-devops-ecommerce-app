apiVersion: apps/v1
kind: Deployment

metadata:
  name: cart-deployment
  namespace: ecommerce

spec:
  replicas: 2

  selector:
    matchLabels:
      app: cart-service

  template:
    metadata:
      labels:
        app: cart-service
        version: v1

    spec:
      containers:
        - name: cart-service
          image: ecommerce-cart:v1
          imagePullPolicy: IfNotPresent

          command: ["node"]
          args: ["server.js"]

          ports:
            - containerPort: 3003

          livenessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: ecommerce-config
                  key: CART_PORT

            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: ecommerce-config
                  key: NODE_ENV

            - name: MONGO_USERNAME
              valueFrom:
                secretKeyRef:
                  name: ecommerce-secrets
                  key: MONGO_USERNAME

            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ecommerce-secrets
                  key: MONGO_PASSWORD

            - name: MONGO_CLUSTER
              valueFrom:
                secretKeyRef:
                  name: ecommerce-secrets
                  key: MONGO_CLUSTER

            - name: MONGO_DBNAME
              valueFrom:
                secretKeyRef:
                  name: ecommerce-secrets
                  key: MONGO_DBNAME

            - name: ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ecommerce-secrets
                  key: ACCESS_TOKEN