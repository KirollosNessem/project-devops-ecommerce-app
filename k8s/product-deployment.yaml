apiVersion: apps/v1
kind: Deployment

metadata:
  name: product-deployment
  namespace: ecommerce

spec:
  replicas: 2

  selector:
    matchLabels:
      app: product-service

  template:
    metadata:
      labels:
        app: product-service

    spec:
      containers:
        - name: product-service
          image: ecommerce-product:v1
          imagePullPolicy: Never

          command: ["node"]
          args: ["server.js"]

          ports:
            - containerPort: 3002

          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: ecommerce-config
                  key: PRODUCT_PORT

            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: ecommerce-config
                  key: NODE_ENV

            - name: MONGO_USERNAME
              valueFrom:
                secretKeyRef:
                  name: ecommerce-secrets
                  key: MONGO_USERNAME

            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ecommerce-secrets
                  key: MONGO_PASSWORD

            - name: MONGO_CLUSTER
              valueFrom:
                secretKeyRef:
                  name: ecommerce-secrets
                  key: MONGO_CLUSTER

            - name: MONGO_DBNAME
              valueFrom:
                secretKeyRef:
                  name: ecommerce-secrets
                  key: MONGO_DBNAME

            - name: ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ecommerce-secrets
                  key: ACCESS_TOKEN